<!DOCTYPE html>
<html
        th:with="dir=${T(org.vitalii.fedyk.currency.utils.LocaleUtils).getLocationDirection(#locale.language)}"
        th:lang="${#locale.language}"
        th:dir="${dir}"
        xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            margin: 0;
            padding: 0;
        }

        .container {
            background-color: #ffffff;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            border-radius: 8px;
        }

        .header {
            text-align: center;
            color: #4b85bf;
            margin-bottom: 20px;
        }

        .books-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .books-table th,
        .books-table td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: start;
        }

        .books-table th {
            background-color: #f2f2f2;
        }

        .total {
            margin-top: 20px;
            font-weight: bold;
            font-size: 1.1em;
            text-align: end;
        }
    </style>
</head>

<body th:dir="${dir}">
<div class="container">
    <h1 class="header" th:text="#{email.purchase.header(${firstName}, ${lastName})}"></h1>

    <p th:text="#{email.purchase.message}"></p>

    <table class="books-table">
        <thead>
        <tr>
            <th th:text="#{email.purchase.book.author}"></th>
            <th th:text="#{email.purchase.book.title}"></th>
            <th th:text="#{email.purchase.book.price}"></th>
            <th th:text="#{email.purchase.book.quantity}"></th>
            <th th:text="#{email.purchase.book.total}"></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="book : ${books}">
            <td>
                <span th:text="${book.author}"></span>
            </td>
            <td>
                <span th:text="${book.title}"></span>
            </td>
            <td>
                <span dir="ltr" th:text="${book.price}"></span>
            </td>
            <td th:text="${book.quantity}"></td>
            <td>
                <span dir="ltr" th:text="${book.lineItemTotal}"></span>
            </td>
        </tr>
        </tbody>
    </table>


    <p class="total">
        <span>
            <span th:text="#{email.purchase.total}"></span>
            <span dir="ltr" th:text="${totalOrderPrice}"></span>
        </span>
    </p>

</div>
</body>
</html>
